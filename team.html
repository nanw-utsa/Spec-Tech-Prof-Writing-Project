<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sipra - Meet Our Team</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg: #f7fbff;
        --primary: #0b2545;
        --accent: #cfe8ff;
        --highlight: #fff6a5;
        --white: #ffffff;
      }

      body {
        font-family: "Inter", sans-serif;
        background: var(--bg);
        color: var(--primary);
        margin: 0;
      }

      header {
        background: var(--white);
        border-bottom: 2px solid var(--accent);
        padding: 1rem 2rem;
      }

      nav ul {
        display: flex;
        gap: 2rem;
        list-style: none;
      }

      nav a {
        text-decoration: none;
        color: var(--primary);
        position: relative;
        font-weight: 600;
      }

      nav a::after {
        content: "";
        position: absolute;
        left: 0;
        bottom: -3px;
        width: 100%;
        height: 6px;
        background: var(--highlight);
        transform: scaleX(0) skewX(-12deg);
        transform-origin: left;
        transition: transform 0.25s ease;
        z-index: -1;
      }

      nav a:hover::after,
      nav a.active::after {
        transform: scaleX(1) skewX(-12deg);
      }

      h1 {
        font-family: "Patrick Hand", cursive;
        font-size: 2.5rem;
      }

      /* flexible layout for future team cards */
      .container {
        width: 70%;
        margin: 4rem auto;
      }

      .team-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 2rem;
      }

      /* placeholder card style */
      .team-member {
        background: var(--white);
        padding: 1.5rem;
        box-shadow: 6px 6px 0px var(--accent);
        min-height: 200px;
      }
    </style>
  </head>

  <body>
    <header>
      <nav>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="mission.html">Mission Statement</a></li>
          <li><a href="team.html" class="active">Meet Our Team</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <div class="container">
        <h1>Meet Our Team</h1>

        <div class="team-grid">
          <div class="team-member">
            <!-- Member -->
          </div>

          <div class="team-member">
            <!-- Member -->
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
